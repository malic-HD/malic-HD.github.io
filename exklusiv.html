<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exklusive Bilder</title>
<style>
  body {
    background-color: #80bfff;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  h1 {
    font-size: 60px;
    color: white;
    margin-top: 20px;
  }

  /* Galerie Container */
  .gallery {
    display: flex;
    justify-content: center; /* zentriert alle Bilder */
    flex-wrap: wrap; /* Umbruch auf kleinen Bildschirmen */
    gap: 20px; /* Abstand zwischen Bildern */
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto; /* zentriert die Galerie auf der Seite */
  }

  .gallery img {
    width: 100%;
    max-width: 400px; /* maximale Bildbreite */
    height: auto;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
  }

  .gallery img:hover {
    transform: scale(1.05); /* leichter Zoom beim Hover */
  }

  /* Einhorn zurück zur Startseite */
  .unicorn-button {
    display: block;
    margin: 20px auto;
    width: 150px; /* Größe des Einhorn-Bilds */
    height: auto;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .unicorn-button:hover {
    transform: scale(1.1);
  }
</style>
</head>
<body>

<h1>Exklusive Bilder</h1>

<div class="gallery">
  <img src="IMG_7388.JPEG" alt="Exklusives Bild 1">
  <img src="IMG_2730.JPEG" alt="Exklusives Bild 2">
</div>

<!-- Klickbares Einhorn zurück zur Startseite -->
<img src="51ZvsYMAHcL._AC_UF894,1000_QL80_.jpg" 
     class="unicorn-button" 
     alt="Zurück zur Startseite" 
     onclick="window.location.href='index.html'">

</body>
</html>
