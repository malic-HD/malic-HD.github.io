<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exklusive Bilder</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #80bfff, #4da6ff);
    color: white;
    text-align: center;
  }

  h1 {
    font-size: 50px;
    margin-top: 30px;
  }

  /* Galerie */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1000px;
    margin: auto;
  }

  .card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  .card img {
    width: 100%;
    border-radius: 10px;
  }

  /* Einhorn als Rückkehr-Button */
  .unicorn-button {
    width: 120px;
    margin-top: 30px;
    cursor: pointer;
    transition: 0.3s;
  }

  .unicorn-button:hover {
    transform: scale(1.2) rotate(-5deg);
  }

  footer {
    margin-top: 40px;
    padding: 20px;
    font-size: 14px;
    opacity: 0.8;
  }
</style>

</head>

<body>

<h1>🔒 Exklusive Bilder 🔒</h1>

<div class="gallery">
  <div class="card">
    <img src="IMG_7388.JPEG" alt="Exklusives Bild 1">
  </div>

  <div class="card">
    <img src="IMG_2730.JPEG" alt="Exklusives Bild 2">
  </div>
</div>

<!-- Einhorn als Rückkehr-Button zur Startseite -->
<img src="51ZvsYMAHcL._AC_UF894,1000_QL80_.jpg"
     class="unicorn-button"
     alt="Zurück zur Startseite"
     onclick="window.location.href='index.html'">

<footer>
  🔐 Nur für Leute mit Code 😎
</footer>

</body>
</html>
