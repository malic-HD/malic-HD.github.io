<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malic</title>
<style>
  body {
    background-color: #80bfff;
    text-align: center;
    font-family: Arial, sans-serif;
  }

  h1 {
    text-align: center;
    font-size: 70px;
    color: white;
    margin-top: 20px;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  .container img {
    display: block;
    height: auto;
    max-width: 600px;
  }

  .same-size-image {
    display: block;
    margin: 20px auto;
    max-width: 600px;
    height: auto;
  }

  /* Einhorn-Bild als klickbarer Button */
  .unicorn-button {
    display: block;
    margin: 20px auto;
    width: 150px; /* Größe des Einhorn-Bilds */
    height: auto;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .unicorn-button:hover {
    transform: scale(1.1);
  }

  a {
    color: white;
    text-decoration: underline;
  }
</style>
<script>
  function checkCode() {
    let code = prompt("Bitte Code eingeben:");
    if(code === "123456") {
      alert("Code korrekt! ✅ Du wirst weitergeleitet.");
      window.location.href = "exklusiv.html";
    } else {
      alert("Falscher Code ❌");
    }
  }
</script>
</head>
<body>

<h1>Malic</h1>

<p>
  <a href="https://www.arta-biohof.ch/" target="_blank">
    Arta-Biohof
  </a>
</p>

<div class="container">
  <img src="2026-03-15_16.34.42.png" alt="Minecraft Bild">
  <img src="coole-schildkrote-mit-sonnenbrille-im-wasser.jpg" alt="Schildkröte">
</div>

<img src="download.jpg" class="same-size-image" alt="Download Bild">

<!-- Klickbares Einhorn-Bild -->
<img src="51ZvsYMAHcL._AC_UF894,1000_QL80_.jpg" class="unicorn-button" alt="Klicke das Einhorn" onclick="checkCode()">

</body>
</html>
