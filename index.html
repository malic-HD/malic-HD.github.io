<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malic</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background-color: #80bfff; /* Blauer Hintergrund wieder */
    overflow-x: hidden;
  }

  h1 {
    font-size: 60px;
    margin-top: 30px;
    /* Sterne entfernt, nur Malic */
    text-shadow: 2px 2px 8px #000;
  }

  p {
    font-size: 18px;
  }

  a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
    padding: 10px 20px;
    border-radius: 10px;
    transition: 0.3s;
  }

  a:hover {
    background: rgba(0,0,0,0.5);
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
  }

  .card {
    background: rgba(0,0,0,0.3);
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
  }

  .card img {
    width: 100%;
    border-radius: 10px;
  }

  .unicorn-button {
    width: 120px;
    margin-top: 30px;
    cursor: pointer;
    transition: 0.3s;
  }

  .unicorn-button:hover {
    transform: scale(1.2) rotate(5deg);
  }

  footer {
    margin-top: 40px;
    padding: 20px;
    font-size: 14px;
    opacity: 0.8;
  }

</style>

<script>
  function checkCode() {
    let code = prompt("Bitte Code eingeben:");
    if(code === "malicistcool") {
      let overlay = document.createElement("div");
      overlay.innerHTML = "🎉 LEVEL FREIGESCHALTET 🎉";
      overlay.style.position = "fixed";
      overlay.style.top = "50%";
      overlay.style.left = "50%";
      overlay.style.transform = "translate(-50%, -50%) scale(0.5)";
      overlay.style.fontSize = "40px";
      overlay.style.fontWeight = "bold";
      overlay.style.color = "white";
      overlay.style.background = "rgba(0,0,0,0.7)";
      overlay.style.padding = "30px";
      overlay.style.borderRadius = "20px";
      overlay.style.zIndex = "9999";
      overlay.style.transition = "0.5s";
      document.body.appendChild(overlay);

      setTimeout(() => { overlay.style.transform = "translate(-50%, -50%) scale(1)"; }, 100);

      confetti({ particleCount: 150, angle: 60, spread: 80, origin: { x: 0, y: 1 } });
      confetti({ particleCount: 150, angle: 120, spread: 80, origin: { x: 1, y: 1 } });

      setTimeout(() => { window.location.href = "exklusiv.html"; }, 2000);
    } else {
      alert("Falscher Code ❌");
    }
  }
</script>

</head>
<body>

<h1>Malic</h1>

<p>
  <a href="https://www.arta-biohof.ch/" target="_blank">🔗 Arta-Biohof besuchen</a>
</p>

<div class="container">
  <div class="card">
    <img src="2026-03-15_16.34.42.png" alt="Minecraft Bild">
  </div>
  <div class="card">
    <img src="coole-schildkrote-mit-sonnenbrille-im-wasser.jpg" alt="Schildkröte">
  </div>
  <div class="card">
    <img src="download.jpg" alt="Bild">
  </div>
</div>

<img src="51ZvsYMAHcL._AC_UF894,1000_QL80_.jpg"
     class="unicorn-button"
     alt="Einhorn"
     onclick="checkCode()">

<footer>© 2026 Malic Website</footer>

</body>
</html>
